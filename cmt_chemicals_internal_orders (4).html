<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CMT Chemicals Internal Order Form</title>
  <style>
    :root {
      --accent: #e88ab5;
      --line: #f1cddd;
      --text: #4a3240;
      --muted: #866879;
    }

    body {
      margin: 0;
      font-family: Arial;
      background: #fff8fc;
      color: var(--text);
    }

    .wrap { max-width: 1200px; margin: auto; padding: 20px; }

    .card {
      background: white;
      border: 1px solid var(--line);
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .card-header {
      background: #ffe9f3;
      padding: 10px;
      font-weight: bold;
    }

    .card-body { padding: 15px; }

    input, select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border-radius: 8px;
      border: 1px solid #e9c7d8;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid var(--line);
    }

    th { background: #ffe9f3; }
  </style>
</head>
<body>
<div class="wrap">

  <div class="card">
    <div class="card-header">Add Order</div>
    <div class="card-body">
      <form id="form">

        <label>Purchase Order</label>
        <input id="po" required>

        <label>Date</label>
        <input type="date" id="date" required>

        <label>Customer</label>
        <input id="customer" required>

        <label>Product</label>
        <input id="product" required>

        <label>Quantity</label>
        <input type="number" id="qty" required>

        <label>Unit Price (R)</label>
        <input type="number" step="0.01" id="price" required>

        <label>VAT</label>
        <select id="vat">
          <option value="0">No VAT</option>
          <option value="0.15">15% VAT</option>
        </select>

        <button>Save</button>
      </form>
    </div>
  </div>

  <div class="card">
    <div class="card-header">Summary</div>
    <div class="card-body">
      <p>Total Orders: <span id="count">0</span></p>
      <p>Total Value (Incl VAT): <span id="total">R 0.00</span></p>
    </div>
  </div>

  <div class="card">
    <div class="card-header">Orders</div>
    <div class="card-body">
      <table>
        <thead>
          <tr>
            <th>PO</th>
            <th>Customer</th>
            <th>Total (Excl)</th>
            <th>VAT</th>
            <th>Total (Incl)</th>
          </tr>
        </thead>
        <tbody id="table"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
const form = document.getElementById('form');
const table = document.getElementById('table');

function load(){
  const data = JSON.parse(localStorage.getItem('cmt')||'[]');
  let total=0;
  table.innerHTML='';

  data.forEach(d=>{
    total+=d.totalIncl;
    table.innerHTML+=`<tr>
      <td>${d.po}</td>
      <td>${d.customer}</td>
      <td>R ${d.totalExcl.toFixed(2)}</td>
      <td>R ${d.vatAmount.toFixed(2)}</td>
      <td>R ${d.totalIncl.toFixed(2)}</td>
    </tr>`;
  });

  document.getElementById('count').innerText=data.length;
  document.getElementById('total').innerText='R '+total.toFixed(2);
}

form.onsubmit = e => {
  e.preventDefault();
  const data = JSON.parse(localStorage.getItem('cmt')||'[]');

  const qty = Number(qty.value);
  const price = Number(price.value);
  const vatRate = Number(vat.value);

  const totalExcl = qty * price;
  const vatAmount = totalExcl * vatRate;
  const totalIncl = totalExcl + vatAmount;

  data.push({
    po: po.value,
    customer: customer.value,
    totalExcl,
    vatAmount,
    totalIncl
  });

  localStorage.setItem('cmt',JSON.stringify(data));
  form.reset();
  load();
}

load();
</script>

</body>
</html>
